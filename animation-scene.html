<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Scene</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>
<a-sphere color="cyan" height="4"
                    radius:5;
                    animation="
                    property:position;
                    from:-4 2 -22;
                    to: -4 -8 -8;
                    loop:true;
                    dur:2000;
                    dir:alternate;
                    "
       ></a-sphere>
    </body>
</html>
